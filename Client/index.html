<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <script defer src="/socket.io/socket.io.js"></script>
        <script defer type="module" src="main.js"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
                      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
                      crossorigin="anonymous"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
                                                                                             integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <title>ChatApp</title>
    </head>

    <body>
        <div class="layout">
            <div class="socket-holder">
            </div>

            <div class="title">
                <div class="chatapp-title">
                    <h1>ChatApp</h1>
                </div>
            </div>

            <div class="message-holder">
                <div id="show-content"></div>
            </div>


            <div class="input-window">

                <div id="roomSection" class = "addSection hide">
                    <input type="text" id="room-input" placeholder= "Room ID">
                    <button type="button" id="send-room">Join</button>
                    <button id="cancelRoomBtn" class="close-btn">✕</button>
                </div>

                <div id="idSection" class = "addSection hide">
                    <input type="text" id="id-input" placeholder= "Connect with ID">
                    <button type="button" id="send-id">Confirm</button>
                    <button id="cancelIdBtn" class="close-btn">✕</button>
                </div>

                <div class="input-row">
                    <input type="text" id="message-input" placeholder= "Type a message">

                    <button type="button" id="send-message">Send</button>

                    <div class="menu-container">
                        <button id="menuButton">+</button>

                        <div id="menuDropdown" class="menu-dropdown">
                            <button id="openRoom">Join Room</button>
                            <button id="openId">Direct Message</button>

                        </div>
                    </div>
                </div>
                </div>

            <div class="notification-popup hide" id="notification-popup">
                <div class="notification-content">
                    <div class="notification-header" id="notification-header">
                        <span class="notification-label">Message Request</span>
                        <span class="notification-id" id="request-id">abcd1234</span>
                    </div>
                    <div class="notification-body hide" id="notification-body">
                        <p>You have a message request from:</p>
                        <strong id="request-id-expanded">abcd1234</strong>
                        <div class="notification-actions">
                            <button id="accept-btn" class="accept-action">Accept & Connect</button>
                            <button id="ignore-btn" class="ignore-action">Ignore</button>
                        </div>
                    </div>
                </div>
            </div>
    </body>

</html>
